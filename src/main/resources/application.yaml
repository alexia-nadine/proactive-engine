server:
  port: 8080

spring:
  application:
    name: proactive-engine
  # Configuração RabbitMQ
  rabbitmq:
      host: ${RABBITMQ_HOST:localhost}
      port: ${RABBITMQ_PORT:5672}
      username: ${RABBITMQ_USER}
      password: ${RABBITMQ_PASSWORD}

proactive:
  rules:
    thresholds:
      # Início do período considerado noturno para a persona (jovem pcd cadeirante)
      night-start-time: "22:00"
      # Término do período noturno
      night-end-time: "06:00"

      # Limiar de lux para garantir deslocamento seguro durante a noite de uma pessoa cadeirante
      # Verificar depois se esse valor tem unidade de medida e se preciso incluir no codigo
      min-safe-luminosity: 150

      # Tempo máximo de permanência (ADL) antes de considerar anomalia
      bed-absence-delay-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ProactiveEngine